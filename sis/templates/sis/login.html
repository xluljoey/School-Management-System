{% extends 'sis/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75" style="min-height: 60vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white text-center py-3">
                <h5 class="mb-0 fw-bold">School Management System</h5>
                <small>Sign in to your account</small>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold text-secondary">Username / ID</label>
                        <input type="text" name="username" id="username" class="form-control" placeholder="Enter your username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold text-secondary">Password</label>
                        <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100 py-2 fw-bold">Sign In</button>
                </form>
            </div>
        </div>
        <p class="text-center text-muted small mt-3">&copy; {% now "Y" %} School Management System</p>
    </div>
</div>
{% endblock %}
